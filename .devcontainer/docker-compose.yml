# Dev workspace service. dockerComposeFile in devcontainer.json also pulls in
# ../docker/docker-compose.yml which provides the sibling services (Postgres
# etc.); this file only adds the workspace and wires it to them.
#
# Relative paths inside ../docker/docker-compose.yml (build context etc.)
# resolve against that file's own directory when Docker Compose loads it as a
# separate -f entry — so `context: .` in docker/docker-compose.yml still means
# docker/, not .devcontainer/.
#
# Inside the workspace, reach services by Compose service name, never
# localhost — localhost is the workspace itself. Published ports in the
# repo's Compose file still work from the host.

services:
  dev:
    image: mcr.microsoft.com/devcontainers/javascript-node:24
    command: sleep infinity
    # No host bind mounts on purpose: open this repo with "Dev Containers:
    # Clone Repository in Container Volume…", which mounts the cloned repo
    # volume at /workspaces. A `..:/workspaces/hello-zero` host bind would
    # break that flow on a machine with no host checkout.
    environment:
      # Overrides the 127.0.0.1:5430 value in .env (container env beats
      # dotenv, which won't override an already-set variable). Inside the
      # workspace localhost is the workspace itself, so connect to the
      # sibling Postgres by its Compose service name and container port.
      ZERO_UPSTREAM_DB: postgresql://user:password@zstart_postgres:5432/postgres
    depends_on:
      zstart_postgres:
        condition: service_healthy
