services:
  zstart_postgres:
    # Seed scripts are baked into the image (see Dockerfile.postgres) rather
    # than bind-mounted, so this works with "Clone Repository in Container
    # Volume" where there is no host path to bind. After editing seed.sql,
    # rebuild with `docker compose ... up --build`.
    build:
      context: .
      dockerfile: Dockerfile.postgres
    shm_size: 1g
    user: postgres
    restart: always
    healthcheck:
      test: 'pg_isready -U user --dbname=postgres'
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - 5430:5432
    environment:
      POSTGRES_USER: user
      POSTGRES_DB: postgres
      POSTGRES_PASSWORD: password
    command: |
      postgres 
      -c wal_level=logical
      -c max_wal_senders=10 
      -c max_replication_slots=5 
      -c hot_standby=on 
      -c hot_standby_feedback=on
    volumes:
      - zstart_pgdata:/var/lib/postgresql/data

volumes:
  zstart_pgdata:
    driver: local
